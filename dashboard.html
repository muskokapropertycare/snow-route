<!DOCTYPE html>
<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    body{font-family:Arial,sans-serif;background:#0a1628;color:#fff;min-height:100vh;}

    .login-box{background:#0d2040;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;border:1px solid #1a3a6b;}
    .login-logo{font-size:48px;text-align:center;margin-bottom:8px;}
    .login-title{font-size:22px;font-weight:bold;text-align:center;color:#90caf9;margin-bottom:4px;}
    .login-sub{font-size:13px;text-align:center;color:#78909c;margin-bottom:24px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:12px;color:#90caf9;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
    .field input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #1a3a6b;background:#0a1628;color:#fff;font-size:15px;outline:none;transition:border-color .2s;}
    .field input:focus{border-color:#1565c0;}
    #login-error{color:#ef5350;font-size:13px;min-height:18px;margin-bottom:10px;}
    .btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:16px;font-weight:bold;cursor:pointer;transition:background .2s;}
    .btn-blue{background:#1565c0;color:#fff;}
    .btn-blue:hover{background:#1976d2;}
    #app-screen{display:none;flex-direction:column;min-height:100vh;}
    #topbar{background:#1565c0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
    #topbar h1{font-size:17px;font-weight:bold;}
    .topbar-right{display:flex;align-items:center;gap:12px;}
    #last-updated{font-size:11px;color:#bbdefb;}
    .btn-sm{padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-weight:bold;cursor:pointer;}
    .btn-gray{background:#37474f;color:#ccc;}
    .btn-red{background:#c62828;color:#fff;}
    #nav-tabs{display:flex;background:#0d2040;border-bottom:2px solid #1a3a6b;}
    .nav-tab{padding:12px 20px;font-size:13px;font-weight:bold;cursor:pointer;color:#78909c;border-bottom:3px solid transparent;transition:all .2s;}
    .nav-tab.active{color:#90caf9;border-bottom-color:#1565c0;}
    #tab-dashboard{display:block;}
    #stats{display:flex;flex-wrap:wrap;gap:10px;padding:14px 16px;background:#0d2040;}
    .stat{flex:1;min-width:120px;background:#1a3a6b;border-radius:12px;padding:12px 16px;}
    .stat-label{font-size:11px;color:#90caf9;text-transform:uppercase;letter-spacing:.5px;}
    .stat-value{font-size:30px;font-weight:bold;margin-top:4px;}
    .stat-value.green{color:#66bb6a;}
    .stat-value.red{color:#ef5350;}
    .stat-value.blue{color:#64b5f6;}
    #pbar-wrap{padding:0 16px 12px;background:#0d2040;}
    #pbar-bg{background:#1a3a6b;border-radius:10px;height:20px;overflow:hidden;}
    #pbar-fill{background:linear-gradient(90deg,#1565c0,#2e7d32);height:100%;border-radius:10px;transition:width .6s ease;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;}
    #map{height:340px;}
    #tractors-section{padding:14px 16px;background:#0d2040;border-top:2px solid #1a3a6b;}
    #tractors-section h2{font-size:13px;text-transform:uppercase;color:#90caf9;letter-spacing:.5px;margin-bottom:10px;}
    .tractor-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a3a6b;font-size:13px;}
    .tractor-dot{width:12px;height:12px;border-radius:50%;background:#1565c0;flex-shrink:0;}
    .tractor-name{font-weight:bold;}
    #lists{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:14px 16px;background:#0a1628;}
    .list-section h3{font-size:12px;text-transform:uppercase;color:#90caf9;letter-spacing:.5px;margin-bottom:10px;}
    .list-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #1a3a6b;font-size:12px;}
    .list-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;flex-shrink:0;}
    .list-num.done{background:#2e7d32;}
    .list-num.todo{background:#c62828;}
    #reset-section{padding:14px 16px;background:#0a1628;border-top:2px solid #1a3a6b;}

    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
    .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
    .form-field label{display:block;font-size:11px;color:#90caf9;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
    .form-field input{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #1a3a6b;background:#0a1628;color:#fff;font-size:14px;outline:none;transition:border-color .2s;}

    .btn-green{background:#2e7d32;color:#fff;}

    .btn-add{padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:bold;cursor:pointer;}

    <div id="reset-section">

    </div>
  </div>
  <div id="tab-clients">

    <div class="add-client-form">
      <div class="form-row">
        <div class="form-field">
          <label>Client Name *</label>
          <input type="text" id="new-name" placeholder="e.g. John Smith"/>
        </div>
        <div class="form-field">
          <label>Address *</label>
          <input type="text" id="new-addr" placeholder="e.g. 123 Main St, Bracebridge ON"/>
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-field">
          <label>Latitude *</label>
          <input type="number" id="new-lat" placeholder="e.g. 45.0334" step="0.000001"/>
        </div>
        <div class="form-field">
          <label>Longitude *</label>
          <input type="number" id="new-lng" placeholder="e.g. -79.3089" step="0.000001"/>
        </div>
        <div class="form-field">

      </div>

// ── AUTH ───────────────────────────────────────────────────────────
async function doLogin(){
  var email=document.getElementById("login-email").value.trim();
  var pwd=document.getElementById("login-password").value;
  var errEl=document.getElementById("login-error");
  errEl.textContent="Signing in...";
  try{
    await signInWithEmailAndPassword(auth,email,pwd);
    errEl.textContent="";
  }catch(e){
    errEl.textContent="Invalid email or password. Please try again.";
  }
}

onAuthStateChanged(auth,function(user){
  if(user){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app-screen").style.display="flex";
    if(!initialized){initialized=true;initApp();}
  }else{
    document.getElementById("login-screen").style.display="flex";
    document.getElementById("app-screen").style.display="none";
  }
});

// ── TAB NAV ────────────────────────────────────────────────────────
function switchTab(tab){
  document.getElementById("tab-dashboard").style.display=tab==="dashboard"?"block":"none";
  document.getElementById("tab-clients").style.display=tab==="clients"?"block":"none";
  document.getElementById("tab-btn-dashboard").className="nav-tab"+(tab==="dashboard"?" active":"");
  document.getElementById("tab-btn-clients").className="nav-tab"+(tab==="clients"?" active":"");
  if(tab==="clients")renderClientTable();
}

// ── INIT ───────────────────────────────────────────────────────────────────
function initApp(){
  map=L.map("map").setView([45.035,-79.315],13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"&copy; OpenStreetMap"}).addTo(map);
  // Load PROPERTIES from Firebase (so dashboard and operator stay in sync)
  onValue(ref(db,"route/config/properties"),function(snap){
    var fbProps=snap.val();
    if(fbProps){
      PROPERTIES=Object.values(fbProps);
    } else {
      savePropertiesToFirebase();
    }
    PROPERTIES.sort(function(a,b){return a.order-b.order;});
    startListening();
  },{onlyOnce:true});
}

  // Add property markers to map
  PROPERTIES.forEach(function(p){
    var icon=L.divIcon({className:"",html:"<div style='background:#c62828;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;border:2px solid #fff;'>"+p.order+"</div>",iconSize:[26,26],iconAnchor:[13,13]});
    var marker=L.marker([p.lat,p.lng],{icon}).addTo(map).bindPopup("<b>"+p.order+". "+p.name+"</b><br/>"+p.addr);
    markerMap[p.id]=marker;
  });

  // FIXED: Listen to route/properties (operator writes {done:true, completedBy, completedAt} here)
  onValue(ref(db,"route/properties"),function(snap){
    var data=snap.val()||{};
    var total=PROPERTIES.length;
    var doneCount=0;
    var doneList=document.getElementById("done-list");
    var todoList=document.getElementById("todo-list");
    doneList.innerHTML="";todoList.innerHTML="";

    PROPERTIES.forEach(function(p){
      var entry=data[p.id]||{};
      var isDone=entry.done===true;
      if(isDone)doneCount++;

      // Update marker color on map
      var newColor=isDone?"#2e7d32":"#c62828";
      if(markerMap[p.id]){
        var iconHtml="<div style='background:"+newColor+";color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;border:2px solid #fff;'>"+p.order+"</div>";
        markerMap[p.id].setIcon(L.divIcon({className:"",html:iconHtml,iconSize:[26,26],iconAnchor:[13,13]}));
      }

      var by=entry.completedBy?"by "+entry.completedBy:"";
      var div=document.createElement("div");
      div.className="list-item";
      var byHtml=by?"<br/><span style='color:#64b5f6;font-size:11px;'>"+by+"</span>":"";
      div.innerHTML="<div class='list-num "+(isDone?"done":"todo")+"'>"+p.order+"</div><div><b>"+p.name+"</b><br/><span style='color:#78909c;font-size:11px;'>"+p.addr+"</span>"+byHtml+"</div>";
      (isDone?doneList:todoList).appendChild(div);
    });

    var pct=total>0?Math.round(doneCount/total*100):0;
    document.getElementById("s-pct").textContent=pct+"%";
    document.getElementById("s-done").textContent=doneCount;
    document.getElementById("s-left").textContent=total-doneCount;
    var fill=document.getElementById("pbar-fill");
    fill.style.width=pct+"%";
    fill.textContent=pct+"%";
    document.getElementById("last-updated").textContent="Updated: "+new Date().toLocaleTimeString();
  });

  // FIXED: Listen to operators - show email as display name, not raw UID
  onValue(ref(db,"operators"),function(snap){
    var ops=snap.val()||{};
    var active=Object.values(ops).filter(function(v){return v.lat&&v.lng;});
    document.getElementById("s-drivers").textContent=active.length;
    var tList=document.getElementById("tractor-list");
    tList.innerHTML="";
    active.forEach(function(v){
      var displayName=v.email||"Unknown Operator";
      var d=document.createElement("div");
      d.className="tractor-row";
      d.innerHTML="<div class='tractor-dot'></div><div><div class='tractor-name'>"+displayName+"</div><div style='color:#78909c;font-size:11px;'>"+v.lat.toFixed(5)+", "+v.lng.toFixed(5)+"</div></div>";
      tList.appendChild(d);
    });
  });
}

// ── RESET: Clears route/properties (removes done flags) ──────────
function confirmReset(){
  if(confirm("Reset ALL completed driveways? This cannot be undone.")){
    // Remove only done flags, not the whole node (operator may have other data)
    get(ref(db,"route/properties")).then(function(snap){
      var data=snap.val()||{};
      var updates={};
      Object.keys(data).forEach(function(id){
        // Remove completion entries (keep any non-completion data)
        updates["route/properties/"+id]=null;
      });
      update(ref(db),updates);
    });
  }
}

// ── SAVE PROPERTIES TO FIREBASE ──────────────────────────────────────
function savePropertiesToFirebase(){
  var obj={};
  PROPERTIES.forEach(function(p){obj[p.id]=p;});
  set(ref(db,"route/config/properties"),obj);
}

// ── MANAGE CLIENTS ─────────────────────────────────────────────────
async function addClient(){
  var name=document.getElementById("new-name").value.trim();
  var addr=document.getElementById("new-addr").value.trim();
  var lat=parseFloat(document.getElementById("new-lat").value);
  var lng=parseFloat(document.getElementById("new-lng").value);
  var orderInput=document.getElementById("new-order").value;
  var msgEl=document.getElementById("form-msg");
  if(!name||!addr||isNaN(lat)||isNaN(lng)){
    msgEl.textContent="Please fill in Name, Address, Latitude, and Longitude.";
    msgEl.className="form-msg-err";return;
  }
  var maxOrder=PROPERTIES.reduce(function(m,p){return Math.max(m,p.order);},0);
  var order=orderInput&&!isNaN(parseInt(orderInput))?parseInt(orderInput):maxOrder+1;
  // If a specific slot was chosen, shift all existing properties at that slot and above up by 1
  if(orderInput&&!isNaN(parseInt(orderInput))){
    PROPERTIES.forEach(function(p){if(p.order>=order)p.order++;});
  }
  var id="p"+Date.now();
  PROPERTIES.push({id:id,order:order,name:name,addr:addr,lat:lat,lng:lng});
  PROPERTIES.sort(function(a,b){return a.order-b.order;});
  savePropertiesToFirebase();
  msgEl.textContent="Added "+name+" — route updated for all operators.";
  msgEl.className="form-msg-ok";
  document.getElementById("new-name").value="";
  document.getElementById("new-addr").value="";
  document.getElementById("new-lat").value="";
  document.getElementById("new-lng").value="";
  document.getElementById("new-order").value="";
  renderClientTable();
}

function renderClientTable(){
  var q=(document.getElementById("search-clients").value||"").toLowerCase();
  var filtered=PROPERTIES.filter(function(p){return p.name.toLowerCase().indexOf(q)>=0||p.addr.toLowerCase().indexOf(q)>=0;});
  document.getElementById("client-count").textContent=PROPERTIES.length;
  var tbody=document.getElementById("client-tbody");
  tbody.innerHTML="";

  // Get current completion data to show status in table
  get(ref(db,"route/properties")).then(function(snap){
    var completionData=snap.val()||{};
    filtered.sort(function(a,b){return a.order-b.order;}).forEach(function(p){
      var entry=completionData[p.id]||{};
      var isDone=entry.done===true;
      var tr=document.createElement("tr");
      var td1=document.createElement("td");td1.innerHTML="<span class='order-badge'>#"+p.order+"</span>";
      var td2=document.createElement("td");td2.innerHTML="<b>"+p.name+"</b>";
      var td3=document.createElement("td");td3.style.color="#90caf9";td3.textContent=p.addr;
      var td4=document.createElement("td");td4.style.color="#78909c";td4.style.fontSize="11px";td4.textContent=p.lat.toFixed(5)+", "+p.lng.toFixed(5);
      var td5=document.createElement("td");
      td5.innerHTML=isDone?"<span style='color:#66bb6a;font-size:11px;font-weight:bold;'>&#10003; Done</span>":"<span style='color:#ef5350;font-size:11px;'>Pending</span>";
      var td6=document.createElement("td");
      var btn=document.createElement("button");btn.className="remove-btn";btn.textContent="Remove";
      btn.dataset.id=p.id;btn.addEventListener("click",handleRemove);
      td6.appendChild(btn);
      tr.appendChild(td1);tr.appendChild(td2);tr.appendChild(td3);tr.appendChild(td4);tr.appendChild(td5);tr.appendChild(td6);
      tbody.appendChild(tr);
    });
  });
}

async function handleRemove(e){
  var id=e.currentTarget.dataset.id;
  var prop=PROPERTIES.find(function(p){return p.id===id;});
  if(!prop)return;
  if(!confirm("Remove "+prop.name+" ("+prop.addr+") from the route?"))return;
  PROPERTIES=PROPERTIES.filter(function(p){return p.id!==id;});
  // Re-number remaining properties sequentially
  PROPERTIES.sort(function(a,b){return a.order-b.order;}).forEach(function(p,i){p.order=i+1;});
  // Save updated property list to Firebase so operator app syncs
  savePropertiesToFirebase();
  // Also remove any completion data for this property
  remove(ref(db,"route/properties/"+id));
  renderClientTable();
}
</script>
